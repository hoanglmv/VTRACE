# High-quality training configuration for Public Set
pipeline:
  data_dir: "./VAI_NVS_DATA/phase1/public_set"
  output_dir: "./output_public_high"

training:
  iterations: 30000
  resolution: 1
  data_device: "cuda"
  sh_degree: 3
  lambda_dssim: 0.4
  lambda_opacity: 0.0
  lambda_scale: 0.0001
  lambda_edge: 1.0

render:
  skip_training: false
  format: "jpg"
