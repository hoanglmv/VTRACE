# Default Configuration for VTRACE 3DGS Pipeline

pipeline:
  data_dir: "./VAI_NVS_DATA/phase1/public_set"
  output_dir: "./output"

training:
  iterations: 30000
  resolution: 1 # Resolution scaling factor (1 = full, 2 = half, etc.)
  sh_degree: 3 # Spherical Harmonics degree
  
render:
  skip_training: false
  format: "png"
