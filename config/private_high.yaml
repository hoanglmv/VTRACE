# High-quality training configuration for Private Set
pipeline:
  data_dir: "./VAI_NVS_DATA_ROUND2/phase1/private_set1"
  output_dir: "./output_private_high"

training:
  iterations: 30000
  resolution: 1
  data_device: "cuda"
  sh_degree: 3
  lambda_dssim: 0.4
  lambda_opacity: 0.0
  lambda_scale: 0.0001
  lambda_edge: 1.0
  densify_until_iter: 20000
  antialiasing: true

render:
  skip_training: false
  format: "jpg"
  antialiasing: true
  distortion_mode: "native"
  with_ut: true
  supersample: 1.0
  downsample_filter: "area"
  jpeg_quality: 100
  checkpoint_iteration: "latest"
  post_process: false
